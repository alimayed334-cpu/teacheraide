name: teacher_aide_pro
description: تطبيق مساعد المعلم لإدارة الطلاب والفصول الدراسية
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
 
  # Firebase
  firebase_core: ^3.10.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  
  # UI Components
  cupertino_icons: ^1.0.6
  material_design_icons_flutter: ^7.0.7296
  
  # Database
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.4.0+2
  sqflite_common_ffi_web: ^1.1.1
  path: ^1.8.3
  
  # Hive - Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # File Operations
  path_provider: ^2.1.1
  
  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.11.0
  google_fonts: ^6.1.0
  
  # Excel Export
  excel: ^4.0.2
  
  # Image Picker
  image_picker: ^1.0.4
  
  # Permissions
  permission_handler: ^11.0.1
  
  # Date/Time
  intl: ^0.20.2
  
  # Charts for Reports
  fl_chart: ^0.64.0
  
  # File Sharing
  share_plus: ^7.2.1
  
  # Email Sending
  mailer: ^6.0.1
  
  # Biometric Authentication
  local_auth: ^2.1.6
  
  # HTTP Requests (for future cloud sync)
  http: ^1.1.0
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # UUID Generation
  uuid: ^4.2.1
  
  # URL Launcher for messaging apps
  url_launcher: ^6.2.4
  
  # File picker (Android/iOS/Windows)
  file_picker: ^10.3.8
  
  # Google Drive API
  google_sign_in: ^6.2.1
  googleapis: ^12.0.0
  googleapis_auth: ^1.6.0
  # flutter_secure_storage: ^9.0.0  # Removed due to Windows build issues
  
  arabic_font: ^0.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  json_serializable: ^6.7.1
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/sql/
    - assets/icons/
    - assets/icon/
  
  fonts:
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic-Regular.ttf
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
